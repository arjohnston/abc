version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      storybook:
        patterns: ["@storybook/*", "storybook", "@chromatic-com/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "@testing-library/*", "happy-dom"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
